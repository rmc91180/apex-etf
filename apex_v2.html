<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>APEX v2</title>
<style>
:root{
  --black:#060810; --s0:#0b0e16; --s1:#111620; --s2:#181e2c; --s3:#1f2840;
  --border:#1e2d45; --border2:#2a3d5e;
  --green:#00e87a; --amber:#f5a623; --red:#ff3d5a; --blue:#4a90e2;
  --txt:#e8ecf4; --txt2:#8a96ad; --txt3:#5a6580;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
  --mono:"SF Mono","SFMono-Regular",ui-monospace,"Roboto Mono",Menlo,monospace;
  --sat:env(safe-area-inset-top); --sab:env(safe-area-inset-bottom);
  --sal:env(safe-area-inset-left); --sar:env(safe-area-inset-right);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--sans); background:var(--black); color:var(--txt);
  font-size:15px; line-height:1.45; overflow-x:hidden;
  background-image:
    linear-gradient(rgba(74,144,226,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(74,144,226,.025) 1px,transparent 1px);
  background-size:28px 28px;
}
@keyframes fade-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.82)}}
@keyframes tape{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.fade-up{animation:fade-up .35s ease both}

/* TAPE */
#tape{
  position:fixed;top:0;left:0;right:0;z-index:60;height:32px;
  padding-top:var(--sat); background:var(--s0);
  border-bottom:1px solid var(--border); overflow:hidden; display:flex; align-items:center;
}
.tape-track{display:flex;white-space:nowrap;animation:tape 40s linear infinite;will-change:transform}
.tape-item{padding:0 16px;font-family:var(--mono);font-size:12px;color:var(--txt2);display:inline-flex;gap:6px;align-items:center}
.tape-item b{color:var(--txt)}
.tape-up{color:var(--green)} .tape-dn{color:var(--red)}
.tape-ph{padding:0 16px;font-size:12px;color:var(--txt3);font-family:var(--mono)}

/* HEADER */
header{
  position:fixed;left:0;right:0;z-index:55;
  top:calc(32px + var(--sat)); height:48px;
  display:flex;align-items:center;gap:10px;padding:0 16px;
  background:linear-gradient(180deg,var(--black),rgba(6,8,16,.85));
  border-bottom:1px solid var(--border); backdrop-filter:blur(8px);
}
.logo-dot{width:11px;height:11px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green);animation:pulse 1.8s ease-in-out infinite}
.logo-txt{font-weight:800;letter-spacing:2px;font-size:16px}
.logo-txt span{color:var(--green)}
.hdr-right{margin-left:auto;font-size:11px;color:var(--txt3);font-family:var(--mono)}

main{
  padding:calc(80px + var(--sat) + 14px) calc(14px + var(--sar)) calc(82px + var(--sab)) calc(14px + var(--sal));
  max-width:560px;margin:0 auto;min-height:100vh;
}

/* NAV */
nav{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  display:flex;overflow-x:auto;overflow-y:hidden;
  background:var(--s0);border-top:1px solid var(--border);
  padding:6px calc(6px + var(--sar)) calc(6px + var(--sab)) calc(6px + var(--sal));
  scrollbar-width:none;
}
nav::-webkit-scrollbar{display:none}
.nav-btn{
  flex:0 0 auto;min-width:58px;background:none;border:none;color:var(--txt3);
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 4px;
  font-family:var(--sans);font-size:9px;font-weight:600;letter-spacing:.5px;cursor:pointer;
  position:relative;border-radius:9px;transition:.15s;
}
.nav-btn .ico{font-size:19px;line-height:1}
.nav-btn.active{color:var(--green);background:var(--s2)}
.nav-dot{position:absolute;top:3px;right:10px;width:7px;height:7px;border-radius:50%}
.nav-dot.red{background:var(--red);box-shadow:0 0 6px var(--red)}
.nav-dot.amber{background:var(--amber);box-shadow:0 0 6px var(--amber)}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.card-h{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.card-h h2{font-size:13px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--txt2)}
.muted{color:var(--txt2)} .mono{font-family:var(--mono)} .small{font-size:12px}
.center{text-align:center}

/* BUTTONS */
.btn{
  width:100%;border:1px solid var(--border2);background:var(--s2);color:var(--txt);
  border-radius:12px;padding:13px;font-family:var(--sans);font-size:14px;font-weight:700;
  cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:active{transform:scale(.98)}
.btn.green{background:linear-gradient(135deg,#00e87a,#00b85f);color:#04130c;border:none}
.btn.amber{background:var(--amber);color:#1a1300;border:none}
.btn.red{background:var(--red);color:#fff;border:none}
.btn.ghost{background:transparent}
.btn.sm{padding:9px;font-size:12px;border-radius:10px}
.btn:disabled{opacity:.5;cursor:not-allowed}

.jtm-btn{
  width:100%;padding:22px;font-size:20px;font-weight:800;letter-spacing:1px;
  border-radius:16px;border:1.5px solid var(--green);color:#04130c;
  background:linear-gradient(135deg,#00e87a,#00c267);
  box-shadow:0 0 30px rgba(0,232,122,.35),inset 0 0 0 1px rgba(255,255,255,.15);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;
}
.jtm-btn:active{transform:scale(.985)}
.jtm-btn:disabled{opacity:.7}

.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite}
.spinner.dark{border-color:rgba(4,19,12,.3);border-top-color:#04130c}

/* PRIMARY TRADE CARD */
.primary-card{
  background:linear-gradient(150deg,rgba(0,232,122,.10),rgba(0,232,122,.02));
  border:1.5px solid rgba(0,232,122,.4);border-radius:16px;padding:18px;margin-bottom:14px;
  box-shadow:0 0 24px rgba(0,232,122,.12);
}
.pc-tkr{font-size:34px;font-weight:800;letter-spacing:1px;line-height:1}
.pc-dir{display:inline-flex;gap:6px;align-items:center;font-size:13px;font-weight:700;padding:3px 9px;border-radius:8px;background:rgba(0,232,122,.18);color:var(--green)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 1.6s infinite}

.nums{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:14px 0}
.num-cell{background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:10px;padding:9px 8px;text-align:center}
.num-cell .lbl{font-size:9px;letter-spacing:1px;color:var(--txt3);text-transform:uppercase;margin-bottom:3px}
.num-cell .val{font-family:var(--mono);font-size:15px;font-weight:700}

.meter{height:7px;background:rgba(0,0,0,.35);border-radius:99px;overflow:hidden;margin:10px 0}
.meter-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--amber),var(--green))}

.secondary-card{background:var(--s1);border:1px solid rgba(245,166,35,.4);border-radius:14px;padding:14px;margin-bottom:14px}
.avoid-card{background:rgba(255,61,90,.05);border:1px solid rgba(255,61,90,.3);border-radius:14px;padding:14px;margin-bottom:14px}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-size:11px;font-weight:600;padding:5px 10px;border-radius:99px;border:1px solid var(--border2);background:var(--s2);color:var(--txt2);cursor:pointer}
.chip.green{background:rgba(0,232,122,.12);border-color:rgba(0,232,122,.4);color:var(--green)}
.chip.active{background:var(--green);color:#04130c;border-color:var(--green)}

.badge{font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:6px}
.b-buy{background:rgba(0,232,122,.15);color:var(--green)}
.b-watch{background:rgba(245,166,35,.15);color:var(--amber)}
.b-avoid{background:rgba(255,61,90,.15);color:var(--red)}

/* BUDGET BAR */
.budget{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:14px}
.budget-top{display:flex;justify-content:space-between;font-size:11px;margin-bottom:7px;color:var(--txt2);font-family:var(--mono)}
.budget-bar{height:6px;background:rgba(0,0,0,.4);border-radius:99px;overflow:hidden}
.budget-fill{height:100%;border-radius:99px;transition:width .3s}

/* INPUTS */
label.fld{display:block;font-size:11px;letter-spacing:.5px;color:var(--txt3);text-transform:uppercase;margin:0 0 5px 2px}
input,textarea,select{
  width:100%;background:var(--s2);border:1px solid var(--border2);color:var(--txt);
  border-radius:10px;padding:11px;font-family:var(--mono);font-size:14px;margin-bottom:12px;
}
textarea{font-family:var(--sans);resize:vertical;min-height:90px}
input:focus,textarea:focus{outline:none;border-color:var(--blue)}
input[type=range]{padding:0;-webkit-appearance:none;background:transparent;height:28px}
input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:99px;background:var(--s3)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--green);margin-top:-8px;box-shadow:0 0 10px rgba(0,232,122,.5)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* TABLES */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;color:var(--txt3);font-weight:600;font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:6px 6px;border-bottom:1px solid var(--border)}
td{padding:8px 6px;border-bottom:1px solid var(--border);font-family:var(--mono)}

/* SCATTER GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.etf-cell{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:11px;cursor:pointer;transition:.15s}
.etf-cell:active{transform:scale(.97);border-color:var(--border2)}
.etf-ico{font-size:22px}
.etf-t{font-weight:800;font-size:15px}
.etf-n{font-size:10px;color:var(--txt3)}

.alert-banner{display:flex;gap:10px;align-items:center;padding:11px 13px;border-radius:12px;margin-bottom:10px;font-size:13px}
.alert-banner button{margin-left:auto;background:none;border:none;color:var(--txt2);font-size:18px;cursor:pointer;padding:0 4px}
.a-stop{background:rgba(255,61,90,.12);border:1px solid rgba(255,61,90,.4)}
.a-target{background:rgba(0,232,122,.12);border:1px solid rgba(0,232,122,.4)}
.a-near{background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.4)}
.a-rsi{background:rgba(245,166,35,.10);border:1px solid rgba(245,166,35,.3)}
.a-open{background:rgba(74,144,226,.12);border:1px solid rgba(74,144,226,.4)}

.regime-directive{background:rgba(0,232,122,.07);border:1px solid rgba(0,232,122,.3);border-radius:12px;padding:13px;margin-bottom:14px}
.corr-warn{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.35);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--amber)}

.empty{text-align:center;color:var(--txt3);padding:30px 10px;font-size:13px}
.status-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle}
.sd-on{background:var(--green);box-shadow:0 0 6px var(--green)} .sd-off{background:var(--red)}

/* TOAST */
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(92px + var(--sab));z-index:90;
  background:var(--s3);border:1px solid var(--border2);color:var(--txt);padding:11px 18px;border-radius:12px;
  font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .25s;max-width:90vw;text-align:center}
#toast.show{opacity:1}
hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.kv{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.kv .k{color:var(--txt2)}
.pos-big{font-size:22px;font-weight:800;font-family:var(--mono)}
.g{color:var(--green)} .r{color:var(--red)} .a{color:var(--amber)} .bl{color:var(--blue)}
</style>
</head>
<body>
<div id="tape"><div class="tape-ph">Fetch live data in the Live tab</div></div>
<header>
  <div class="logo-dot"></div>
  <div class="logo-txt">APEX<span>.</span></div>
  <div class="hdr-right" id="hdrRight"></div>
</header>
<main id="view"></main>
<nav id="nav"></nav>
<div id="toast"></div>

<script>
"use strict";

/* ===================== DATA ===================== */
const WL = [
  {t:"SLV", n:"Silver",         th:"Metals",    ico:"🥈",lev:"1x"},
  {t:"GLD", n:"Gold",           th:"Metals",    ico:"🥇",lev:"1x"},
  {t:"USLV",n:"2x Silver",      th:"Metals",    ico:"⚡",lev:"2x"},
  {t:"NUGT",n:"2x Gold Miners", th:"Metals",    ico:"⛏️",lev:"2x"},
  {t:"GDXJ",n:"Jr Gold Miners", th:"Metals",    ico:"🪨",lev:"1x"},
  {t:"SOXL",n:"3x Semis",       th:"Tech",      ico:"💻",lev:"3x"},
  {t:"TQQQ",n:"3x Nasdaq",      th:"Tech",      ico:"📡",lev:"3x"},
  {t:"TECL",n:"3x Tech",        th:"Tech",      ico:"🔬",lev:"3x"},
  {t:"FNGU",n:"3x FANG+",       th:"Tech",      ico:"🤖",lev:"3x"},
  {t:"LABU",n:"3x Biotech",     th:"Tech",      ico:"🧬",lev:"3x"},
  {t:"USO", n:"Oil",            th:"Energy",    ico:"🛢️",lev:"1x"},
  {t:"GUSH",n:"3x Oil & Gas",   th:"Energy",    ico:"🔥",lev:"3x"},
  {t:"BOIL",n:"2x Natural Gas", th:"Energy",    ico:"💨",lev:"2x"},
  {t:"DRIP",n:"3x Short Oil",   th:"Energy",    ico:"📉",lev:"3x"},
  {t:"UNG", n:"Natural Gas",    th:"Energy",    ico:"🌡️",lev:"1x"},
  {t:"KOLD",n:"2x Short Gas",   th:"Energy",    ico:"❄️",lev:"2x"},
  {t:"UVXY",n:"1.5x VIX",       th:"Volatility",ico:"🌪️",lev:"1.5x"},
  {t:"TNA", n:"3x Small Cap",   th:"Macro",     ico:"📊",lev:"3x"},
  {t:"SPXL",n:"3x S&P 500",     th:"Macro",     ico:"🏦",lev:"3x"},
  {t:"IBIT",n:"Bitcoin ETF",    th:"Crypto",    ico:"₿", lev:"1x"},
];
const THEMES = ["Metals","Tech","Energy","Volatility","Macro","Crypto"];
const DAYS   = ["MON","TUE","WED","THU","FRI"];
const CORR = [
  {a:"SLV",b:"USLV",note:"SLV & USLV move together"},
  {a:"GLD",b:"NUGT",note:"GLD & NUGT correlated"},
  {a:"SOXL",b:"TQQQ",note:"Semis & Nasdaq correlated"},
  {a:"USO",b:"GUSH",note:"Oil & 3x Oil move together"},
  {a:"BOIL",b:"UNG",note:"Both track natural gas"},
  {a:"KOLD",b:"BOIL",note:"KOLD is inverse of BOIL"},
  {a:"DRIP",b:"GUSH",note:"DRIP is inverse of GUSH"},
];
const RC = {
  "Risk-On Rally":        {bg:"rgba(0,232,122,.06)",border:"rgba(0,232,122,.25)",text:"#00e87a"},
  "Risk-Off Safety":      {bg:"rgba(245,166,35,.06)",border:"rgba(245,166,35,.25)",text:"#f5a623"},
  "High Volatility Chop": {bg:"rgba(255,61,90,.06)", border:"rgba(255,61,90,.25)", text:"#ff3d5a"},
  "Sector Rotation":      {bg:"rgba(74,144,226,.06)",border:"rgba(74,144,226,.25)",text:"#4a90e2"},
};

/* ===================== STATE ===================== */
const S = {
  positions:[], closedTrades:[], analyses:{}, notes:{},
  regime:null, watchlistData:null, newsData:{}, liveQ:{}, techD:{},
  patterns:null, briefing:null, jtmResult:null,
  avKey:'', claudeKey:'',
  avBudget:{date:'',count:0},
  tgToken:'', tgChatId:'',
  weeklyEvents:'',
  rrMultiplier:2.0,
  formBudget:'500',
  tab:'home', activePosId:null,
  day:(()=>{const d=new Date().getDay();return(d===0||d===6)?0:d-1;})(),
  load:{}, alerts:[], lastAlert:{}, lastPollAt:null,
  showForm:false, formETF:null, formEntry:'', formShares:'', formStop:6,
  hiInputs:{}, exitInputs:{}, noteInput:'', toastMsg:null, toastTmr:null, pollTmr:null,
  cycle:0,
};
const PKEYS=['positions','closedTrades','notes','regime','watchlistData','briefing','techD','patterns','avBudget','tgToken','tgChatId','avKey','claudeKey','weeklyEvents','rrMultiplier','liveQ','analyses','formBudget'];
function save(){ try{ PKEYS.forEach(k=>localStorage.setItem('apex_'+k, JSON.stringify(S[k]))); }catch(e){ console.warn('save',e); } }
function load(){ PKEYS.forEach(k=>{ try{ const v=localStorage.getItem('apex_'+k); if(v!=null) S[k]=JSON.parse(v); }catch(e){ console.warn('load',k,e); } }); }

/* ===================== HELPERS ===================== */
const f=(n,d=2)=>{ const x=parseFloat(n); return isNaN(x)?'—':x.toFixed(d); };
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const todayFull = () => new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
const now = () => new Date().toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});

const stopP = p => f(p.high * (1 - p.stopPct/100));
const targP = p => {
  const stop = parseFloat(stopP(p));
  const rr   = parseFloat(S.rrMultiplier || 2.0);
  return f(parseFloat(p.entry) + (parseFloat(p.entry) - stop) * rr);
};

const techCtx = () => Object.entries(S.techD).map(([t,d])=>`${t}:RSI${d.rsi!=null?f(d.rsi,1):"?"},MACD${d.macd?.bull?"bull":"bear"},SMA50${S.liveQ[t]&&d.sma?(S.liveQ[t].price>d.sma?"above":"below"):"?"}`).join(";")||"none";
const liveCtx = () => Object.entries(S.liveQ).map(([t,q])=>`${t}:$${f(q.price)}(${q.chgPct>=0?"+":""}${f(q.chgPct)}%)`).join(",")||"none";
const eventsCtx = () => S.weeklyEvents || "No events entered — use current week's actual macro calendar";
const histCtx = () => { if(S.closedTrades.length<3)return""; const wins=S.closedTrades.filter(t=>parseFloat(t.pnlPct)>0); const losses=S.closedTrades.filter(t=>parseFloat(t.pnlPct)<=0); return`History: winRate ${wr()}%, best: ${[...new Set(wins.map(t=>t.etf.t))].slice(0,3).join(",")}, worst: ${[...new Set(losses.map(t=>t.etf.t))].slice(0,3).join(",")}.`; };

function wr(){ if(!S.closedTrades.length) return 0; const w=S.closedTrades.filter(t=>parseFloat(t.pnlPct)>0).length; return Math.round(w/S.closedTrades.length*100); }
function kellyFrac(){
  const ct=S.closedTrades; if(ct.length<5) return 0;
  const wins=ct.filter(t=>parseFloat(t.pnl)>0); const losses=ct.filter(t=>parseFloat(t.pnl)<=0);
  if(!wins.length||!losses.length) return 0;
  const W=wins.length/ct.length;
  const avgW=wins.reduce((a,t)=>a+parseFloat(t.pnl),0)/wins.length;
  const avgL=Math.abs(losses.reduce((a,t)=>a+parseFloat(t.pnl),0)/losses.length);
  const R=avgW/avgL; if(!R) return 0;
  return Math.max(0, W-(1-W)/R);
}

/* ===================== AV BUDGET ===================== */
function avToday(){
  const d = new Date().toISOString().slice(0,10);
  if(S.avBudget.date !== d){ S.avBudget = {date:d, count:0}; save(); }
  return S.avBudget;
}
function avLeft(){ return Math.max(0, 25 - avToday().count); }
function avConsume(n){ avToday(); S.avBudget.count = Math.min(25, S.avBudget.count + (n||1)); save(); }
function avCanFetch(){ return avLeft() >= 5; }
function avCanPoll(){ return avLeft() >= Math.max(1, S.positions.length) && S.positions.length > 0; }

/* ===================== TOAST / BEEP / TELEGRAM ===================== */
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  if(S.toastTmr) clearTimeout(S.toastTmr);
  S.toastTmr=setTimeout(()=>el.classList.remove('show'),2800);
}
function beep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.value=880; g.gain.value=0.12;
    o.start(); o.stop(ctx.currentTime+0.22);
  }catch(e){ console.warn('beep',e); }
}
async function tg(msg){
  if(!S.tgToken||!S.tgChatId) return;
  try{
    await fetch(`https://api.telegram.org/bot${S.tgToken}/sendMessage`,{

/* ===================== CLAUDE AI ===================== */
async function ai(prompt){
  if(!S.claudeKey){ toast('Set Claude API key in Setup'); throw new Error('no Claude key'); }
  const body={
    model:'claude-sonnet-4-6',
    max_tokens:3000,
    messages:[{role:'user', content:prompt}],
    tools:[{type:"web_search_20250305", name:"web_search"}]
  };
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      "Content-Type":"application/json",
      "x-api-key":S.claudeKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify(body)
  });
  if(!res.ok){ const t=await res.text(); throw new Error('Claude '+res.status+': '+t.slice(0,120)); }
  const data=await res.json();
  let text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  text=text.replace(/```json/gi,'').replace(/```/g,'').trim();
  const a=text.indexOf('{'), z=text.lastIndexOf('}');
  if(a>=0 && z>a) text=text.slice(a,z+1);
  return JSON.parse(text);
}
async function runAI(key, prompt, onOk){
  S.load[key]=true; render();
  try{ const r=await ai(prompt); onOk(r); }
  catch(e){ console.warn(key,e); toast('AI error: '+e.message); }
  finally{ S.load[key]=false; save(); render(); }
}

/* ===================== POLLING / ALERTS ===================== */
const POLL_INTERVAL = 90 * 60 * 1000; // 90 minutes
function startPoll(){
  if(S.pollTmr) clearInterval(S.pollTmr);
  pollNow();
  S.pollTmr=setInterval(pollNow, POLL_INTERVAL);
}
async function pollNow(){
  if(!S.positions.length) return;
  if(!avCanPoll()){ console.warn('poll skipped: insufficient AV budget'); return; }
  S.cycle=(S.cycle||0)+1;
  for(const p of S.positions){
    try{
      const price=await fetchQuoteOnly(p.etf.t);
      if(price==null) continue;
      if(price>parseFloat(p.high)){ p.high=price; }
      checkAlerts(p, price);
    }catch(e){ console.warn('poll',p.etf.t,e); }
  }
  S.lastPollAt=Date.now(); save();
  if(S.tab==='home'||S.tab==='trades') render();
}
function pushAlert(p, type, msg){
  S.alerts.unshift({id:Date.now()+''+Math.random(), t:p.etf.t, type, msg, at:now()});
  S.alerts=S.alerts.slice(0,4);
  beep(); tg(msg); save();
  if(S.tab==='home'||S.tab==='trades') render();
}
function checkAlerts(p, price){
  const entry=parseFloat(p.entry), sh=parseFloat(p.shares);
  const stop=parseFloat(stopP(p)), targ=parseFloat(targP(p));
  const pnl=(price-entry)*sh;
  const pnlStr=(pnl>=0?'+$':'-$')+f(Math.abs(pnl));
  const td=S.techD[p.etf.t];
  const open=S.liveQ[p.etf.t]?.open;
  const STOP_WARN=1.5, cyc=S.cycle||0;
  const cooled=(key,cd)=>{ const last=S.lastAlert[p.id+':'+key]; if(last!=null && cyc-last<cd) return false; S.lastAlert[p.id+':'+key]=cyc; return true; };
  if(price<=stop){ pushAlert(p,'stop',`🛑 STOP HIT ${p.etf.t} @ $${f(price)} | P&L ${pnlStr} — EXIT NOW`); return; }
  if(price>=targ){ pushAlert(p,'target',`🎯 TARGET HIT ${p.etf.t} @ $${f(price)} | P&L ${pnlStr} — take profit`); return; }
  if(price>stop && price<=stop*(1+STOP_WARN/100)){ if(cooled('near',1)) pushAlert(p,'near',`⚠️ NEAR STOP ${p.etf.t} @ $${f(price)} (stop $${f(stop)})`); }
  if(td&&td.rsi!=null&&td.rsi>=70){ if(cooled('rsi',1)) pushAlert(p,'rsi',`📈 RSI OVERBOUGHT ${p.etf.t} RSI ${f(td.rsi,1)} — consider trimming`); }
  if(open&&price>open*1.005){ if(cooled('open',2)) pushAlert(p,'open',`🟢 ${p.etf.t} ABOVE OPEN +${f((price/open-1)*100,1)}% — bullish`); }
}
function dismissAlert(id){ S.alerts=S.alerts.filter(a=>a.id!=id); save(); render(); }

function addPosition(){
  if(!S.formETF){ toast('Pick an ETF'); return; }
  const entry=parseFloat(S.formEntry), shares=parseFloat(S.formShares), stopPct=parseFloat(S.formStop)||6;
  if(!entry||!shares){ toast('Enter price and shares'); return; }
  const p={id:'p'+Date.now(), etf:S.formETF, entry, shares, high:entry, stopPct, day:S.day, openedAt:Date.now(), note:''};

function closePosition(id){
  const i=S.positions.findIndex(p=>p.id===id); if(i<0) return;
  const p=S.positions[i]; const ex=parseFloat(S.exitInputs[id]);
  if(!ex){ toast('Enter exit price'); return; }
  const pnl=(ex-parseFloat(p.entry))*parseFloat(p.shares);
  const pnlPct=(ex/parseFloat(p.entry)-1)*100;
  S.closedTrades.push({...p, exit:ex, pnl:pnl.toFixed(2), pnlPct:pnlPct.toFixed(2), closedAt:Date.now()});
  S.positions.splice(i,1); delete S.exitInputs[id]; save(); render();
  tg(`📕 CLOSED ${p.etf.t} @ $${f(ex)} | P&L ${pnl>=0?'+':''}$${f(pnl)} (${pnlPct>=0?'+':''}${f(pnlPct)}%)`);
}

      ${S.closedTrades.length>=5?`<div class="small muted" style="margin-bottom:10px">Kelly suggestion: $${Math.round(parseFloat(S.formBudget||500)*Math.min(kellyFrac(),1))} (full) / $${Math.round(parseFloat(S.formBudget||500)*Math.min(kellyFrac(),1)/2)} (half)</div>`:''}

    </div>`;
  } else {
    h+=`<button class="btn green" onclick="S.showForm=true;render()" style="margin-bottom:14px">+ New Position</button>`;

  const ps=S.positions.filter(p=>p.day===S.day);

      ${p.note?`<div class="small muted" style="margin-bottom:8px">📝 ${esc(p.note)}</div>`:''}
      <div class="row2" style="margin-bottom:8px">
        <button class="btn ghost sm" onclick="runAnalysis('${p.id}')" ${S.load['an_'+p.id]?'disabled':''}>${S.load['an_'+p.id]?spin(''):'🤖 Analyze'}</button>
        <button class="btn ghost sm" onclick="fetchQuoteOnly('${p.etf.t}').then(()=>render())">↻ Price</button>
      </div>
      <div style="display:flex;gap:8px">
        <input type="number" step="0.01" placeholder="Exit price" value="${esc(S.exitInputs[p.id]||'')}" oninput="S.exitInputs['${p.id}']=this.value" style="flex:1;margin-bottom:0">

  return h;

function viewPnl(){
  const ct=S.closedTrades;
  const total=ct.reduce((a,t)=>a+parseFloat(t.pnl||0),0);
  const wins=ct.filter(t=>parseFloat(t.pnl)>0);
  let h=`<div class="card"><div class="card-h"><h2>P&L Dashboard</h2></div>
    <div class="center"><div class="pos-big ${total>=0?'g':'r'}">${total>=0?'+':''}$${f(total)}</div><div class="small muted">realized P&L · ${ct.length} trades · ${wr()}% win rate</div></div>
  </div>`;
  // open positions table with target
  if(S.positions.length){
    h+=`<div class="card"><div class="card-h"><h2>Open Positions</h2></div>
      <table><tr><th>ETF</th><th>Entry</th><th>Now</th><th>Target</th><th>P&L</th></tr>`;
    S.positions.forEach(p=>{
      const lq=S.liveQ[p.etf.t]; const cur=lq?lq.price:parseFloat(p.entry);
      const pnl=(cur-parseFloat(p.entry))*parseFloat(p.shares);
      h+=`<tr><td>${p.etf.t}</td><td>$${f(p.entry)}</td><td>${lq?'$'+f(cur):'—'}</td><td class="g">$${targP(p)}</td><td class="${pnl>=0?'g':'r'}">${pnl>=0?'+':''}$${f(pnl)}</td></tr>`;
    });
    h+=`</table></div>`;
  }
  // closed
  if(ct.length){
    h+=`<div class="card"><div class="card-h"><h2>Closed Trades</h2></div>
      <table><tr><th>ETF</th><th>Entry</th><th>Exit</th><th>P&L</th><th>%</th></tr>`;
    ct.slice().reverse().forEach(t=>{
      h+=`<tr><td>${t.etf.t}</td><td>$${f(t.entry)}</td><td>$${f(t.exit)}</td><td class="${parseFloat(t.pnl)>=0?'g':'r'}">${parseFloat(t.pnl)>=0?'+':''}$${f(t.pnl)}</td><td class="${parseFloat(t.pnlPct)>=0?'g':'r'}">${parseFloat(t.pnlPct)>=0?'+':''}${f(t.pnlPct)}%</td></tr>`;
    });
    h+=`</table></div>`;
  } else h+=`<div class="empty">No closed trades yet.</div>`;
  return h;
}

  </div>`;

  h+=`<div class="card"><div class="card-h"><h2>Data</h2></div>
    <button class="btn ghost sm" style="margin-bottom:10px" onclick="clearLiveCache()">Clear Live Data Cache</button>
    <button class="btn red sm" onclick="clearAll()">Clear All App Data</button>
  </div>`;
  return h;
}

/* ===================== NAV ===================== */
const TABS=[
  {id:'home',  ico:'⚡', label:'JTM'},
  {id:'brief', ico:'📋', label:'Brief'},
  {id:'live',  ico:'📡', label:'Live'},
  {id:'trades',ico:'📈', label:'Trades'},
  {id:'scan',  ico:'👁', label:'Scan'},
  {id:'regime',ico:'🌡️', label:'Regime'},
  {id:'pnl',   ico:'💰', label:'P&L'},
  {id:'journal',ico:'📒',label:'Journal'},
  {id:'alerts',ico:'💬', label:'Alerts'},
  {id:'setup', ico:'⚙️', label:'Setup'},
];
function navDot(id){
  if(id==='home' && !S.jtmResult) return '<span class="nav-dot amber"></span>';
  if(id==='alerts' && (!S.tgToken||!S.tgChatId)) return '<span class="nav-dot red"></span>';
  if(id==='setup' && (!S.avKey||!S.claudeKey)) return '<span class="nav-dot red"></span>';
  return '';
}
function renderNav(){
  document.getElementById('nav').innerHTML=TABS.map(t=>
    `<button class="nav-btn ${S.tab===t.id?'active':''}" onclick="setTab('${t.id}')">${navDot(t.id)}<span class="ico">${t.ico}</span>${t.label}</button>`
  ).join('');
}

/* ===================== TAPE ===================== */
function renderTape(){
  const el=document.getElementById('tape');
  const items=Object.entries(S.liveQ);
  if(!items.length){ el.innerHTML=`<div class="tape-ph">Fetch live data in the Live tab</div>`; return; }
  const one=items.map(([t,q])=>`<span class="tape-item"><b>${t}</b> $${f(q.price)} <span class="${q.chgPct>=0?'tape-up':'tape-dn'}">${q.chgPct>=0?'▲':'▼'}${f(Math.abs(q.chgPct))}%</span></span>`).join('');
  el.innerHTML=`<div class="tape-track">${one}${one}</div>`;
}

/* ===================== MAIN RENDER ===================== */
function render(){
  let html='';
  switch(S.tab){
    case 'home':   html=viewHome();   break;
    case 'brief':  html=viewBrief();  break;
    case 'live':   html=viewLive();   break;
    case 'trades': html=viewTrades(); break;
    case 'scan':   html=viewScan();   break;
    case 'regime': html=viewRegime(); break;
    case 'pnl':    html=viewPnl();    break;
    case 'journal':html=viewJournal();break;
    case 'alerts': html=viewAlerts(); break;
    case 'setup':  html=viewSetup();  break;
    default:       html=viewHome();
  }
  document.getElementById('view').innerHTML=html;
  document.getElementById('hdrRight').textContent='AV '+avLeft()+'/25';
  renderNav();
}

/* ===================== INIT ===================== */
(function init(){
  try{ load(); }catch(e){ console.warn('init load',e); }
  if(typeof S.rrMultiplier!=='number') S.rrMultiplier=parseFloat(S.rrMultiplier)||2.0;
  avToday();
  S.tab='home';
  render(); renderTape();
  if(S.positions.length) startPoll();
})();
</script>
</body>
</html>
