<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="APEX">
<title>APEX — ETF Intelligence</title>
<style>
/* ── SYSTEM FONTS — NO EXTERNAL DEPS ── */
:root {
  --font-display: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
  --font-mono:    'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
  --font-sans:    -apple-system, 'Helvetica Neue', sans-serif;

  --black:    #060810;
  --s0:       #0b0e16;
  --s1:       #111620;
  --s2:       #181e2c;
  --s3:       #1f2840;
  --border:   #1e2d45;
  --border2:  #2a3d5e;
  --text:     #dde5f5;
  --muted:    #4e6080;
  --dim:      #283550;
  --green:    #00e87a;
  --green2:   #00b85f;
  --gbg:      rgba(0,232,122,.07);
  --gborder:  rgba(0,232,122,.22);
  --amber:    #f5a623;
  --abg:      rgba(245,166,35,.08);
  --aborder:  rgba(245,166,35,.25);
  --red:      #ff3d5a;
  --rbg:      rgba(255,61,90,.07);
  --rborder:  rgba(255,61,90,.25);
  --blue:     #4a90e2;
  --bbg:      rgba(74,144,226,.07);
  --r:        10px;
  --rl:       16px;
  --nh:       56px;
  --sb:       env(safe-area-inset-bottom, 16px);
  --st:       env(safe-area-inset-top, 0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--black);color:var(--text);font-family:var(--font-sans);height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* GRID BG */
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(74,144,226,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(74,144,226,.025) 1px,transparent 1px);
  background-size:36px 36px}

#app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1}

/* ── HEADER ── */
.hdr{
  flex-shrink:0;
  padding:0 18px;
  padding-top:var(--st);
  background:rgba(6,8,16,.94);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  height:calc(var(--nh) + var(--st));
  position:relative;
}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,232,122,.4),transparent)}

.logo{font-weight:700;font-size:20px;letter-spacing:4px;color:var(--text);display:flex;align-items:center;gap:8px;font-family:var(--font-display)}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pdot 2s ease-in-out infinite}
@keyframes pdot{0%,100%{opacity:1;box-shadow:0 0 10px var(--green)}50%{opacity:.4;box-shadow:0 0 3px var(--green)}}

.hstats{display:flex;gap:14px;align-items:center}
.hstat{text-align:right}
.hstat-l{font-family:var(--font-mono);font-size:7px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.hstat-v{font-family:var(--font-mono);font-size:12px;font-weight:600;margin-top:1px}

/* ── TICKER TAPE ── */
.tape{flex-shrink:0;background:rgba(11,14,22,.9);border-bottom:1px solid var(--border);overflow:hidden;height:28px}
.tape-inner{display:flex;animation:scroll 40s linear infinite;width:max-content}
.tape-inner:hover{animation-play-state:paused}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tape-item{padding:0 18px;font-family:var(--font-mono);font-size:10px;color:var(--muted);border-right:1px solid var(--border);white-space:nowrap;display:flex;align-items:center;gap:6px;height:28px}
.tape-item span{color:var(--text)}
.up{color:var(--green)!important}
.dn{color:var(--red)!important}

/* ── BANNERS ── */
.banner{flex-shrink:0;padding:5px 16px;font-family:var(--font-mono);font-size:9px;border-bottom:1px solid}

/* ── ALERTS ── */
.alert-stack{flex-shrink:0}
.alert-row{padding:10px 18px;background:rgba(255,61,90,.15);border-bottom:1px solid rgba(255,61,90,.3);display:flex;justify-content:space-between;align-items:center;animation:sdown .3s ease}
@keyframes sdown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
.alert-ttl{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--red);letter-spacing:.3px}
.alert-msg{font-family:var(--font-sans);font-size:10px;color:rgba(255,61,90,.8);margin-top:1px}
.alert-x{width:24px;height:24px;border-radius:50%;background:rgba(255,61,90,.2);border:1px solid rgba(255,61,90,.4);color:var(--red);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nh) + var(--sb) + 16px)}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nh) + var(--sb));padding-bottom:var(--sb);background:rgba(6,8,16,.97);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:6px;z-index:50;overflow-x:auto;-webkit-overflow-scrolling:touch}
.bnav::-webkit-scrollbar{display:none}
.nav-btn{flex:0 0 auto;min-width:52px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:3px 6px;position:relative}
.nav-ico{font-size:17px;line-height:1;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.nav-lbl{font-family:var(--font-mono);font-size:7px;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;transition:color .2s}
.nav-btn.active .nav-ico{transform:scale(1.15)}
.nav-btn.active .nav-lbl{color:var(--green)}
.nav-btn.active::after{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:18px;height:2px;background:var(--green);border-radius:0 0 2px 2px;box-shadow:0 0 8px var(--green)}
.nav-dot{position:absolute;top:1px;right:8px;width:6px;height:6px;border-radius:50%;border:1.5px solid var(--black)}

/* ── TOAST ── */
.toast-el{position:fixed;bottom:calc(var(--nh) + var(--sb) + 16px);left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--border2);border-radius:24px;padding:10px 20px;font-family:var(--font-mono);font-size:11px;color:var(--text);z-index:300;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:tin .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes tin{from{transform:translateX(-50%) translateY(16px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* ── TYPOGRAPHY ── */
.sect{padding:18px 16px 0}
.sect-ttl{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sect-ttl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

.display-num{font-family:var(--font-display);font-size:36px;font-weight:700;letter-spacing:-0.5px;line-height:1}
.display-lg{font-family:var(--font-display);font-size:48px;font-weight:700;letter-spacing:-1px;line-height:1}
.mono-sm{font-family:var(--font-mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.mono-val{font-family:var(--font-mono);font-size:13px;font-weight:600}

/* ── CARDS ── */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;position:relative;transition:transform .15s}
.card:active{transform:scale(.99)}
.card-p{padding:16px}

/* Glows */
.glow-g::before{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(ellipse at 10% 10%,rgba(0,232,122,.06),transparent 60%);pointer-events:none}
.glow-r::before{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(ellipse at 10% 10%,rgba(255,61,90,.06),transparent 60%);pointer-events:none}
.glow-a::before{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(ellipse at 10% 10%,rgba(245,166,35,.06),transparent 60%);pointer-events:none}

/* ── CHIPS / STATS ── */
.chip-row{display:flex;gap:8px;flex-wrap:wrap}
.chip{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;flex:1;min-width:90px}
.chip-l{font-family:var(--font-mono);font-size:7px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.chip-v{font-family:var(--font-mono);font-size:14px;font-weight:600}
.chip-s{font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-top:1px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:8px;font-family:var(--font-mono);font-weight:600;letter-spacing:.3px;cursor:pointer;transition:all .15s;border:none;white-space:nowrap}
.btn:active{transform:scale(.96)}
.btn-g{background:var(--green);color:var(--black);font-size:12px;padding:11px 20px}
.btn-g:hover{background:#00ff87}
.btn-out{background:transparent;border:1px solid var(--border2);color:var(--muted);font-size:10px;padding:7px 14px}
.btn-og{background:var(--gbg);border:1px solid var(--gborder);color:var(--green);font-size:10px;padding:7px 14px}
.btn-or{background:var(--rbg);border:1px solid var(--rborder);color:var(--red);font-size:10px;padding:7px 14px}
.btn-oa{background:var(--abg);border:1px solid var(--aborder);color:var(--amber);font-size:10px;padding:7px 14px}
.btn-sm{font-size:9px!important;padding:5px 10px!important}
.btn-full{width:100%}
.btn-pill{border-radius:999px;padding:6px 14px;font-size:10px;background:var(--s2);border:1px solid var(--border);color:var(--muted)}
.btn-pill.on{background:var(--gbg);border-color:var(--gborder);color:var(--green)}

/* ── INPUTS ── */
.inp{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--font-mono);font-size:13px;padding:10px 13px;width:100%;transition:border-color .2s;outline:none}
.inp:focus{border-color:var(--green)}
.inp-lbl{font-family:var(--font-mono);font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;display:block}
.inp-grp{margin-bottom:12px}

/* ── BADGES ── */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-family:var(--font-mono);font-size:8px;letter-spacing:.3px;font-weight:600}
.bdg-g{background:var(--gbg);border:1px solid var(--gborder);color:var(--green)}
.bdg-r{background:var(--rbg);border:1px solid var(--rborder);color:var(--red)}
.bdg-a{background:var(--abg);border:1px solid var(--aborder);color:var(--amber)}
.bdg-b{background:var(--bbg);border:1px solid rgba(74,144,226,.3);color:var(--blue)}

/* ── ETF PILLS ── */
.etf-pill{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;background:var(--s2);border:1px solid var(--border);border-radius:999px;font-family:var(--font-mono);font-size:11px;color:var(--text);cursor:pointer;transition:all .15s;position:relative;white-space:nowrap}
.etf-pill:active{transform:scale(.95)}
.etf-pill.on{background:var(--gbg);border-color:var(--gborder);color:var(--green)}
.eprice{font-size:9px;color:var(--muted)}
.etf-pill.on .eprice{color:var(--green2)}
.escore{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid var(--black)}
.theme-grp{margin-bottom:14px}
.theme-lbl{font-family:var(--font-mono);font-size:8px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;padding-left:2px}
.etf-row{display:flex;flex-wrap:wrap;gap:6px}

/* ── POSITION CARDS ── */
.pos-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.pos-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),transparent);opacity:0;transition:opacity .2s}
.pos-card.on::before{opacity:1}
.pos-card.on{border-color:rgba(0,232,122,.3);background:rgba(0,232,122,.03)}
.pos-card.warn{border-color:rgba(255,61,90,.4);animation:wflash 1.5s ease-in-out infinite}
@keyframes wflash{0%,100%{border-color:rgba(255,61,90,.4)}50%{border-color:rgba(255,61,90,.1)}}

/* ── DAY TABS ── */
.day-tabs{display:flex;gap:6px;margin-bottom:14px}
.dtab{flex:1;padding:8px 4px;background:var(--s2);border:1px solid var(--border);border-radius:8px;font-family:var(--font-mono);font-size:9px;letter-spacing:1px;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;position:relative}
.dtab.on{background:var(--gbg);border-color:var(--gborder);color:var(--green)}
.dtab.review::after{content:'•';position:absolute;top:2px;right:4px;font-size:9px;color:var(--amber)}

/* ── TIMELINE ── */
.tl{position:relative;padding-left:20px}
.tl::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:1px;background:linear-gradient(to bottom,var(--green),var(--border))}
.tl-item{position:relative;margin-bottom:14px}
.tl-dot{position:absolute;left:-16px;top:4px;width:9px;height:9px;border-radius:50%;border:2px solid var(--black)}
.tl-when{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.tl-act{font-family:var(--font-sans);font-size:11px;color:var(--muted);line-height:1.5}
.tl-trig{font-family:var(--font-mono);font-size:9px;color:var(--dim);margin-top:1px;font-style:italic}

/* ── CHECKLIST ── */
.chk-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.chk-item:last-child{border-bottom:none}
.chk-ico{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px}
.chk-p{background:var(--gbg);border:1px solid var(--gborder);color:var(--green)}
.chk-f{background:var(--rbg);border:1px solid var(--rborder);color:var(--red)}
.chk-lbl{font-family:var(--font-sans);font-size:12px;color:var(--text)}
.chk-note{font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-top:2px}

/* ── TABLE ── */
.dtbl{width:100%;border-collapse:collapse}
.dtbl th{font-family:var(--font-mono);font-size:8px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:8px 8px;text-align:left;border-bottom:1px solid var(--border)}
.dtbl td{padding:8px 8px;font-family:var(--font-mono);font-size:10px;border-bottom:1px solid var(--border);color:var(--text)}
.dtbl tr:last-child td{border-bottom:none}
.dtbl tr{transition:background .1s;cursor:pointer}
.dtbl tr:active{background:var(--s2)}
.ovx{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* ── SIGNAL / SCATTER ── */
.scatter{display:flex;flex-wrap:wrap;gap:6px}
.spill{flex:1;min-width:64px;padding:9px 10px;background:var(--s2);border-radius:var(--r);border:1px solid var(--border)}
.spill-l{font-family:var(--font-mono);font-size:7px;color:var(--muted);letter-spacing:1.5px;margin-bottom:3px;text-transform:uppercase}
.spill-v{font-family:var(--font-mono);font-size:12px;font-weight:600}
.spill-s{font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-top:1px}

/* ── CONVERGENCE ── */
.conv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.conv-cell{padding:8px 4px;border-radius:8px;border:1px solid;text-align:center}
.conv-ico{font-size:12px;margin-bottom:3px}
.conv-lbl{font-family:var(--font-mono);font-size:7px;color:var(--muted);letter-spacing:.8px}
.cp{background:var(--gbg);border-color:var(--gborder)}
.cf{background:var(--rbg);border-color:var(--rborder)}

/* ── PRIMARY CARD ── */
.primary-card{background:linear-gradient(135deg,rgba(0,232,122,.05),rgba(0,232,122,.02));border:1px solid rgba(0,232,122,.25);border-radius:var(--rl);padding:18px;margin-bottom:10px;position:relative;overflow:hidden}
.primary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.pticker{font-family:var(--font-display);font-size:44px;font-weight:700;color:var(--green);letter-spacing:-1px;line-height:1}
.pname{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:.8px;margin-top:2px}

/* ── TECH PANELS ── */
.rsi-track{height:6px;border-radius:3px;background:var(--s3);position:relative;margin-top:6px}
.rsi-thumb{position:absolute;top:-3px;width:12px;height:12px;border-radius:50%;transform:translateX(-50%);border:2px solid var(--black);transition:left .5s}
.rsi-zone{position:absolute;top:0;bottom:0}
.bb-track{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--amber),var(--red));position:relative;margin-top:5px}
.bb-thumb{position:absolute;top:-4px;width:12px;height:12px;border-radius:50%;background:var(--text);border:2px solid var(--black);transform:translateX(-50%);box-shadow:0 0 5px rgba(221,229,245,.3)}

/* ── MISC ── */
.divider{height:1px;background:var(--border);margin:0 -16px}
.live-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-right:4px;animation:pdot 1.5s ease-in-out infinite}
.ovx{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* ── EMPTY / LOADING ── */
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 20px;text-align:center}
.empty-ico{font-size:44px;margin-bottom:14px;opacity:.35}
.empty-ttl{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:-0.3px}
.empty-sub{font-family:var(--font-sans);font-size:12px;color:var(--dim);line-height:1.6;max-width:240px}
.ring{width:34px;height:34px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;text-align:center}
.loading-t{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.loading-s{font-family:var(--font-sans);font-size:11px;color:var(--dim);margin-top:6px}

/* ── DT ROWS ── */
.dt-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.dt-row:last-child{border-bottom:none}
.dt-lbl{font-family:var(--font-mono);font-size:8px;letter-spacing:.8px;padding:2px 8px;border-radius:4px;flex-shrink:0;width:78px;text-align:center}
.dt-txt{font-family:var(--font-sans);font-size:11px;color:var(--muted);line-height:1.5}

/* ── SETUP STEPS ── */
.step{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.step-n{width:24px;height:24px;border-radius:50%;background:var(--s3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--muted);flex-shrink:0}
.step-n.done{background:var(--gbg);border-color:var(--gborder);color:var(--green)}
.step-ttl{font-family:var(--font-sans);font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.step-desc{font-family:var(--font-sans);font-size:11px;color:var(--muted);line-height:1.6}
.hi{color:var(--green);font-family:var(--font-mono)}

/* ── REGIME ── */
.regime-card{border-radius:var(--rl);padding:20px;border:1px solid;position:relative;overflow:hidden;margin-bottom:12px}

/* ── SCENARIO CHIPS ── */

function kelly(){
  const ct=S.closedTrades;
  if(ct.length<5)return{ok:false,fraction:.5,reason:"Need 5+ trades"};
  const wins=ct.filter(t=>parseFloat(t.pnlPct)>0);
  const losses=ct.filter(t=>parseFloat(t.pnlPct)<=0);
  const w=wins.length/ct.length;
  const avgW=wins.length?wins.reduce((s,t)=>s+parseFloat(t.pnlPct),0)/wins.length/100:.06;
  const avgL=losses.length?Math.abs(losses.reduce((s,t)=>s+parseFloat(t.pnlPct),0)/losses.length/100):.06;

}

}

      avFetch({function:"RSI",symbol:ticker,interval:"daily",time_period:14,series_type:"close"}),
      avFetch({function:"MACD",symbol:ticker,interval:"daily",series_type:"close"}),
      avFetch({function:"BBANDS",symbol:ticker,interval:"daily",time_period:20,series_type:"close"}),
      avFetch({function:"SMA",symbol:ticker,interval:"daily",time_period:50,series_type:"close"}),

    let rsi=null,macd=null,bb=null,sma=null;
    if(rD.status==="fulfilled"){const ts=rD.value["Technical Analysis: RSI"];if(ts){const dk=Object.keys(ts).sort().reverse()[0];rsi=parseFloat(ts[dk]["RSI"]);}}

    if(bD.status==="fulfilled"){const ts=bD.value["Technical Analysis: BBANDS"];if(ts){const dk=Object.keys(ts).sort().reverse()[0];const l=ts[dk];bb={u:parseFloat(l["Real Upper Band"]),m:parseFloat(l["Real Middle Band"]),lo:parseFloat(l["Real Lower Band"])};}}

    save();toast("✓ Live data loaded — "+ticker);

  setL(k,false);
}

async function checkAlerts(){
  if(!S.positions.length||avLeft()<3)return;
  for(const p of S.positions){
    if(Date.now()-(S.lastAlert[p.id]||0)<300000)continue;
    try{
      const q=await avFetch({function:"GLOBAL_QUOTE",symbol:p.etf.t});
      S.avReqs=Math.min(25,S.avReqs+1);
      const g=q["Global Quote"];if(!g||!g["05. price"])continue;
      const price=parseFloat(g["05. price"]);
      S.liveQ[p.etf.t]={...S.liveQ[p.etf.t],price,chgPct:parseFloat(g["10. change percent"])};
      const stop=parseFloat(stopP(p)),targ=parseFloat(targP(p));
      const dist=((price-stop)/stop*100);
      let alert=null;
      if(price<=stop)alert={ttl:`🚨 ${p.etf.t} — STOP TRIGGERED`,msg:`$${f(price)} hit stop $${f(stop)} — close immediately`,tg:`🚨 <b>${p.etf.t} STOP TRIGGERED</b>\nPrice: $${f(price)} | Stop: $${f(stop)}\nClose your position immediately.`};
      else if(dist>=0&&dist<STOP_WARN)alert={ttl:`⚠️ ${p.etf.t} — NEAR STOP`,msg:`$${f(price)} is ${f(dist)}% from stop $${f(stop)}`,tg:`⚠️ <b>${p.etf.t} APPROACHING STOP</b>\nPrice: $${f(price)} | Stop: $${f(stop)} | Gap: ${f(dist)}%`};
      else if(price>=targ)alert={ttl:`🎯 ${p.etf.t} — TARGET HIT`,msg:`$${f(price)} reached +${p.stopPct}% target $${f(targ)}`,tg:`🎯 <b>${p.etf.t} TARGET HIT</b>\nPrice: $${f(price)} | Target: $${f(targ)}`};
      if(alert){
        S.alerts=[alert,...S.alerts].slice(0,4);

        save();render();
      }
    }catch{}
  }
}

async function ai(prompt,tokens=1200){
  const r=await fetch(AI_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:tokens,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:prompt}]})});
  const d=await r.json();
  const t=d.content.filter(b=>b.type==="text").map(b=>b.text).join("");
  return JSON.parse(t.replace(/```json[\s\S]*?```|```/g,"").trim());
}

function addPosition(){
  if(!S.formETF||!S.formEntry||!S.formShares)return;
  const entry=parseFloat(S.formEntry),shares=parseFloat(S.formShares);
  const p={id:uid(),etf:S.formETF,entry,shares,stopPct:S.formStop,high:entry,opened:now(),openDay:DAYS[S.day],budget:parseFloat(S.formBudget)};
  S.positions.push(p);S.activePosId=p.id;S.hiInputs[p.id]=f(entry);
  S.showForm=false;S.formETF=null;S.formEntry='';S.formShares='';S.formStop=6;
  S.tab="positions";save();startPoll();
  toast(`✓ Opened ${p.etf.t} @ $${f(entry)}`);
  tgSend(`📈 <b>Opened: ${p.etf.t}</b>\nEntry: $${f(entry)} | Shares: ${shares}\nStop: $${stopP(p)} | Target: $${targP(p)}`);
  render();
}

function closePosOp(id,exitPrice){
  const p=S.positions.find(x=>x.id===id);if(!p)return;
  const ep=exitPrice||S.liveQ[p.etf.t]?.price||p.high;
  const closed={...p,exitPrice:ep,closedAt:now(),closeDay:DAYS[S.day],pnlD:f((ep-p.entry)*p.shares),pnlPct:pct(p.entry,ep)};
  S.closedTrades.unshift(closed);S.positions=S.positions.filter(x=>x.id!==id);
  if(S.activePosId===id)S.activePosId=S.positions[0]?.id||null;
  save();if(!S.positions.length)clearInterval(S.pollTmr);
  const won=parseFloat(closed.pnlPct)>0;
  toast(`${won?"✅":"❌"} ${p.etf.t} — ${parseFloat(closed.pnlD)>=0?"+":""}$${closed.pnlD}`);
  tgSend(`${won?"✅":"❌"} <b>${p.etf.t} Closed</b>\nEntry:$${f(p.entry)} Exit:$${f(ep)}\nP&L:${parseFloat(closed.pnlD)>=0?"+":""}$${closed.pnlD} (${parseFloat(closed.pnlPct)>=0?"+":""}${closed.pnlPct}%)`);
  render();
}

function commitHigh(id){const v=parseFloat(S.hiInputs[id]);if(!v)return;S.positions=S.positions.map(p=>p.id===id?{...p,high:v}:p);save();render();}
function addNote(posId){if(!S.noteInput.trim())return;const k=posId+"-"+DAYS[S.day];S.notes[k]=[...(S.notes[k]||[]),S.noteInput.trim()];S.noteInput="";save();render();}

        </div>`;
      }).join('')}

    {id:"livedata",ico:"📡",lbl:"Live"},
    {id:"kelly",ico:"📐",lbl:"Kelly"},
    {id:"positions",ico:"📈",lbl:"Trades"},
    {id:"checklist",ico:"✅",lbl:"Check"},
    {id:"watchlist",ico:"👁",lbl:"Scan"},

    </div>`).join('')}

  ${S.toastMsg?`<div class="toast-el">${S.toastMsg}</div>`:''}
  `;
}

//  EVENT HANDLERS (global functions for inline onclick)
// ══════════════════════════════════════════════════════
function switchTab(t){
  S.tab=t;render();
  if(t==="watchlist"&&!S.watchlistData&&!S.load.watchlist)runWatchlist();
  if(t==="regime"&&!S.regime&&!S.load.regime)runRegime();
}
function selFormETF(ticker){S.formETF=WL.find(e=>e.t===ticker);if(S.liveQ[ticker])S.formEntry=f(S.liveQ[ticker].price);render();}
function doChecklist(ticker){runChecklist(ticker);}
function openFromCL(ticker,stop){S.formETF=WL.find(e=>e.t===ticker);S.formStop=stop;if(S.liveQ[ticker])S.formEntry=f(S.liveQ[ticker].price);S.showForm=true;S.tab='positions';render();}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
load();
render();
startPoll();
</script>
</body>
</html>
